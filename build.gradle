plugins {
    id 'fabric-loom' version '1.15-SNAPSHOT'
    id 'maven-publish'
}

version = project.mod_version + "+" + project.minecraft_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}


repositories {
    // Serves Polymer modules
    maven {
        url 'https://maven.nucleoid.xyz'
    }
    maven {
        name 'Xander Maven'
        url 'https://maven.isxander.dev/releases'
    }
    maven {
        url "https://repo.biryeong.kim/releases/"
    }

    maven {
        url("https://maven.supersanta.me/snapshots")
    }

    maven {
        url("https://jitpack.io")
    }
    maven {
        url 'https://kneelawk.com/maven/'
        name 'Kneelawk Maven'
    }
    maven {
        url 'https://maven.resourcefulbees.com/repository/maven-public/'
        name 'Resourceful Bees Maven'
    }
    maven {
        // For LibNetworkStack, if using 'syncing' module
        url 'https://maven.alexiil.uk/'
        name 'AlexIIL Maven'
    }

//     Uncomment if using Rosemary or some other Modrinth dependency
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }

        filter {
            includeGroup "maven.modrinth"
        }
    }
    maven { url "https://maven.tomalbrc.de" }
}

dependencies {
    // To change the versions see the gradle.properties file
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    // Polymer
    modImplementation("eu.pb4:polymer-core:${project.polymer_version}")
    modImplementation("eu.pb4:polymer-virtual-entity:${project.polymer_version}")
    modImplementation("eu.pb4:polymer-resource-pack:${project.polymer_version}")
    modImplementation("eu.pb4:polymer-resource-pack-extras:${project.polymer_version}")
    modImplementation("eu.pb4:polymer-autohost:${project.polymer_version}")
    modImplementation("eu.pb4:polymer-blocks:${project.polymer_version}")

    // Server-Translations
    modImplementation include("xyz.nucleoid:server-translations-api:${project.server_translations_version}")
    modImplementation include("xyz.nucleoid:stimuli:${project.stimuli_version}")
    modImplementation include("de.tomalbrc:DialogUtils:${project.dialogutils_version}")
    modImplementation include("eu.pb4:sgui:${project.sgui_version}")

    modImplementation include("net.kyori:adventure-platform-fabric:${project.adventure_platform_version}")
    implementation "net.kyori:adventure-text-minimessage:${project.adventure_api_version}"
    implementation "net.kyori:adventure-api:${project.adventure_api_version}"


    modImplementation include("xyz.nucleoid:fantasy:${project.fantasy_version}")
    modImplementation include("xyz.nucleoid:map-templates:${project.map_templates}")
    modImplementation include("eu.pb4:sidebar-api:${project.sidebar_api_version}")
    modImplementation include("de.tomalbrc:avatar-renderer:${project.avatar_renderer_version}")
    modImplementation include("eu.pb4:map-canvas-api:${project.map_canvas_api_version}")
    modImplementation include("de.tomalbrc:blockbench-import-library:${project.bli_version}")
    modImplementation include("eu.pb4:placeholder-api:2.7.2+1.21.8")

    modImplementation include("kim.biryeong:danta-shader:1.0.2+1.21.8")
    modImplementation include("kim.biryeong:GCB-server:1.0.1+1.21.8")
    modImplementation include("eu.pb4:player-data-api:0.8.0+1.21.6")
    modImplementation("com.teamresourceful.resourcefullib:resourcefullib-fabric-1.21.6:${project.resourceful_lib_version}") {
        transitive = false
    }
    modImplementation "eu.pb4:factorytools:${project.factorytools_version}"
    modImplementation "dev.isxander:yet-another-config-lib:${project.yacl_version}"
    modImplementation "maven.modrinth:friends-and-foes:${project.friends_and_foes_version}"
    modImplementation "maven.modrinth:friends-and-foes-flowery-mooblooms-fabric:${project.flowery_mooblooms_version}"
    modImplementation "maven.modrinth:apel:${project.apel_maven_version}"
    modLocalRuntime files(fileTree("run/mods") {
        include "friends-and-foes-patch-*.jar"
        include "flowery-mooblooms-polymer-patch-*.jar"
    })

    modLocalRuntime("maven.modrinth:carpet:1.4.177")

    implementation include("io.hypersistence:hypersistence-tsid:2.1.4")
    implementation include("org.xerial:sqlite-jdbc:3.46.1.0")

    testImplementation "org.junit.jupiter:junit-jupiter:5.10.3"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher:1.10.3"
}

test {
    useJUnitPlatform()
}

fabricApi {
    configureTests {
        createSourceSet = true
        modId = "semion-td-gametest"
        enableGameTests = true
        enableClientGameTests = false
        eula = true
    }
}

processResources {
    inputs.property "version", project.version
    inputs.property "minecraft_version", project.minecraft_version
    inputs.property "loader_version", project.loader_version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version,
                "minecraft_version": project.minecraft_version,
                "loader_version": project.loader_version
    }
}

def targetJavaVersion = 21
tasks.withType(JavaCompile).configureEach {
    // ensure that the encoding is set to UTF-8, no matter what the system default is
    // this fixes some edge cases with special characters not displaying correctly
    // see http://yodaconditions.net/blog/fix-for-java-file-encoding-problems-with-gradle.html
    // If Javadoc is generated, this must be specified in that task too.
    it.options.encoding = "UTF-8"
    if (targetJavaVersion >= 10 || JavaVersion.current().isJava10Compatible()) {
        it.options.release.set(targetJavaVersion)
    }
}

java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    if (JavaVersion.current() < javaVersion) {
        toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
    // Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
    // if it is present.
    // If you remove this line, sources will not be generated.
    withSourcesJar()
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.archives_base_name}" }
    }
}

// configure the maven publication
publishing {
    publications {
        create("mavenJava", MavenPublication) {
            artifactId = project.archives_base_name
            from components.java
        }
    }

    // See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
    repositories {
        // Add repositories to publish to here.
        // Notice: This block does NOT have the same function as the block in the top level.
        // The repositories here will be used for publishing your artifact, not for
        // retrieving dependencies.
    }
}
